  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090C;
      --text: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.68);
      --text-dim: rgba(255,255,255,0.50);
      --border: rgba(255,255,255,0.10);
      --border-2: rgba(255,255,255,0.14);
      --green: #05D471;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(180deg, #07090C 0%, #050607 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      text-align: center;
      padding: 48px 24px 32px;
      max-width: 520px;
      width: 100%;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.2s ease;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.1s forwards;
    }
    .back:hover { color: var(--text-muted); }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 12px;
      border-radius: 6px;
      background: rgba(5,212,113,0.10);
      border: 1px solid rgba(5,212,113,0.22);
      color: var(--green);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.2s forwards;
    }

    .title {
      font-family: 'DM Sans', sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.3s forwards;
    }
    .title span {
      background: linear-gradient(135deg, rgba(255,255,255,0.95) 40%, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .copy {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-muted);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.4s forwards;
    }

    .cta-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.5s ease-out 0.5s forwards;
    }

    .cta {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .cta:hover { transform: translateY(-2px); }

    @keyframes shimmer-sweep {
      0%   { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateX(300%) skewX(-15deg); opacity: 0; }
    }
    @keyframes btn-glow-pulse {
      0%, 100% { box-shadow: 0 0 0px 0 rgba(5,212,113,0); }
      50%       { box-shadow: 0 0 22px 0px rgba(5,212,113,0.20); }
    }

    .cta-primary {
      background: #25D366;
      color: #fff;
      position: relative;
      overflow: hidden;
      animation: btn-glow-pulse 3.5s ease-in-out infinite;
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cta-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shimmer-sweep 3.5s ease-in-out infinite;
    }
    .cta-primary:hover { box-shadow: 0 6px 24px rgba(37,211,102,0.45); transform: scale(1.06); }
    .cta-primary svg { position: relative; z-index: 1; }

    .cta-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .cta-secondary:hover { border-color: var(--border-2); color: var(--text); }

    .footer {
      margin-top: 56px;
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.6s forwards;
    }
    .footer a {
      color: var(--text-dim);
      text-decoration: none;
    }
    .footer a:hover { color: var(--text-muted); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .title { font-size: 30px; }
      .copy { font-size: 14px; }
      .cta { padding: 11px 20px; font-size: 13px; }
      .cta-primary { padding: 0; width: 56px; height: 56px; font-size: inherit; }
    }
  </style>
